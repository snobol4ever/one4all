# stack subsystem tracepoints
# Exclude 'dummy' — used as discard variable; NRETURN semantics differ
# between CSNOBOL4 (NAME passthrough) and ASM (value deref).
EXCLUDE  dummy
INCLUDE  .*
EXCLUDE  &RANDOM
EXCLUDE  &TIME
EXCLUDE  &DATE
EXCLUDE  &STNO
EXCLUDE  &STCOUNT
EXCLUDE  &STEXEC
EXCLUDE  &.*
IGNORE   &TERMINAL    tty\d+
IGNORE   DATATYPE\(   [a-z]+|[A-Z]+
