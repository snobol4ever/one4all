# tracepoints.conf — SNOBOL4 sync-step monitor instrumentation rules
#
# Rules processed in order:
#   INCLUDE <regex>   — names matching go through (subject to EXCLUDE)
#   EXCLUDE <regex>   — names matching are NOT instrumented
#
# Rules apply to functions (TRACE CALL/RETURN) and variables (TRACE VALUE).
#
# Default tracepoints for beauty self-host monitoring.

INCLUDE  .*

# &-keywords — change frequently; dialects differ on representation.
EXCLUDE  &RANDOM
EXCLUDE  &TIME
EXCLUDE  &DATE
EXCLUDE  &STNO
EXCLUDE  &STCOUNT
EXCLUDE  &STEXEC
EXCLUDE  &.*

# SPITBOL builtins / patterns / functions.  beauty.sno re-uses some of these
# names as user functions (via FENCE.inc, etc.).  SPITBOL refuses to TRACE
# its own builtins (Error 198 "trace first argument is not appropriate name").
# CSNOBOL4 accepts.  Excluded for parity.
EXCLUDE  FENCE
EXCLUDE  SUCCEED
EXCLUDE  FAIL
EXCLUDE  ABORT
EXCLUDE  ARB
EXCLUDE  BAL
EXCLUDE  REM
EXCLUDE  ANY
EXCLUDE  NOTANY
EXCLUDE  BREAK
EXCLUDE  SPAN
EXCLUDE  LEN
EXCLUDE  POS
EXCLUDE  RPOS
EXCLUDE  TAB
EXCLUDE  RTAB
EXCLUDE  ARBNO
EXCLUDE  REPLACE
EXCLUDE  TRIM
EXCLUDE  EVAL
EXCLUDE  APPLY
EXCLUDE  LOAD
EXCLUDE  UNLOAD
EXCLUDE  HOST
EXCLUDE  TRACE
EXCLUDE  STOPTR
EXCLUDE  TERMINAL
EXCLUDE  INPUT
EXCLUDE  OUTPUT
EXCLUDE  CONVERT
EXCLUDE  DIFFER
EXCLUDE  IDENT
EXCLUDE  INTEGER
EXCLUDE  LGT
EXCLUDE  EQ
EXCLUDE  NE
EXCLUDE  LT
EXCLUDE  GT
EXCLUDE  LE
EXCLUDE  GE
EXCLUDE  SIZE
EXCLUDE  DUPL
EXCLUDE  ITEM
EXCLUDE  DUMP
EXCLUDE  OPSYN
EXCLUDE  DETACH
EXCLUDE  EJECT
EXCLUDE  ENDFILE
EXCLUDE  REWIND
EXCLUDE  BACKSPACE
EXCLUDE  CODE
EXCLUDE  COPY
EXCLUDE  DATA
EXCLUDE  FUNCTION
EXCLUDE  DEFINE
EXCLUDE  EXIT
EXCLUDE  CHAR
EXCLUDE  ORD
EXCLUDE  DATATYPE
EXCLUDE  ARRAY
EXCLUDE  PROTOTYPE
EXCLUDE  TABLE
EXCLUDE  STRING
EXCLUDE  EBCDIC
EXCLUDE  ASCII
EXCLUDE  TIME
EXCLUDE  DATE

# Beauty-specific: pattern-typed variables that disagree on string repr.
EXCLUDE  TxInList
EXCLUDE  wList

# ── IGNORE rules ──────────────────────────────────────────────────────────
# Format: IGNORE  <name-regex>  <value-regex>
# When name+value match, the controller masks the value to '<IGNORED>' before
# cross-participant compare.  Used for known cross-dialect representation
# differences where the event itself (its existence + ordering) is meaningful
# but the value text isn't.

# Array-typed variables: CSNOBOL4 returns "ARRAY('1:4')"; SPITBOL returns
# '(undef)' because CONVERT-to-STRING fails on ARRAY values.
IGNORE  PPSTOP        .*ARRAY.*
IGNORE  PPSTOP        \(undef\)
IGNORE  PPSTACK       .*ARRAY.*
IGNORE  PPSTACK       \(undef\)
IGNORE  UTF           .*TABLE.*
IGNORE  UTF           \(undef\)
IGNORE  UTF_ARRAY     .*ARRAY.*
IGNORE  UTF_ARRAY     \(undef\)

# Pattern-typed variables CONVERT to either 'PATTERN' (CSNOBOL4) or
# '(undef)' (SPITBOL when its CONVERT for that internal pattern repr fails).
IGNORE  .*            PATTERN
IGNORE  .*            \(undef\)

# More representation noise: CSNOBOL4 stringifies a deferred-expression
# value (DT_E in scrip parlance) as 'EXPRESSION'.  SPITBOL has no such
# datatype string; CONVERT fails → '(undef)'.  Mask both.
IGNORE  .*           EXPRESSION
IGNORE  .*           CODE
IGNORE  .*           ARRAY
IGNORE  .*           TABLE

# CSNOBOL4 stringifies a user-defined DATA() value as the prototype name
# (e.g. "tree"), SPITBOL stringifies as "(undef)".  Generic mask: any value
# that is a single bare identifier likely names a DATA prototype.
IGNORE  .*           tree
IGNORE  S            tree
